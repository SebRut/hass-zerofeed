default_config:

logger:
  default: info
  logs:
    custom_components.zerofeed: debug

input_number:
  zerofeed_system_load_w:
    name: ZeroFeed System Load
    min: 0
    max: 4000
    step: 25
    unit_of_measurement: W
    initial: 2500
  zerofeed_battery_1_soc:
    name: ZeroFeed Battery 1 SoC
    min: 0
    max: 100
    step: 1
    unit_of_measurement: "%"
    initial: 70
  zerofeed_battery_1_capacity_kwh:
    name: ZeroFeed Battery 1 Capacity
    min: 0.1
    max: 10
    step: 0.1
    unit_of_measurement: kWh
    initial: 10
  zerofeed_battery_2_soc:
    name: ZeroFeed Battery 2 SoC
    min: 0
    max: 100
    step: 1
    unit_of_measurement: "%"
    initial: 50
  zerofeed_battery_2_capacity_kwh:
    name: ZeroFeed Battery 2 Capacity
    min: 0.1
    max: 10
    step: 0.1
    unit_of_measurement: kWh
    initial: 5
  zerofeed_battery_3_soc:
    name: ZeroFeed Battery 3 SoC
    min: 0
    max: 100
    step: 1
    unit_of_measurement: "%"
    initial: 30
  zerofeed_battery_3_capacity_kwh:
    name: ZeroFeed Battery 3 Capacity
    min: 0.1
    max: 10
    step: 0.1
    unit_of_measurement: kWh
    initial: 7
  zerofeed_battery_4_soc:
    name: ZeroFeed Battery 4 SoC
    min: 0
    max: 100
    step: 1
    unit_of_measurement: "%"
    initial: 80
  zerofeed_battery_4_capacity_kwh:
    name: ZeroFeed Battery 4 Capacity
    min: 0.1
    max: 10
    step: 0.1
    unit_of_measurement: kWh
    initial: 3

template:
  - sensor:
      - name: ZeroFeed System Load Power
        unique_id: zerofeed_demo_system_load_power
        state: "{{ states('input_number.zerofeed_system_load_w') | float(0) }}"
        unit_of_measurement: W
        device_class: power
        state_class: measurement
      - name: ZeroFeed Battery 1 SoC
        unique_id: zerofeed_demo_battery_1_soc
        state: "{{ states('input_number.zerofeed_battery_1_soc') | float(0) }}"
        unit_of_measurement: "%"
        device_class: battery
        state_class: measurement
      - name: ZeroFeed Battery 1 Capacity
        unique_id: zerofeed_demo_battery_1_capacity
        state: "{{ states('input_number.zerofeed_battery_1_capacity_kwh') | float(0) }}"
        unit_of_measurement: kWh
        state_class: measurement
      - name: ZeroFeed Battery 2 SoC
        unique_id: zerofeed_demo_battery_2_soc
        state: "{{ states('input_number.zerofeed_battery_2_soc') | float(0) }}"
        unit_of_measurement: "%"
        device_class: battery
        state_class: measurement
      - name: ZeroFeed Battery 2 Capacity
        unique_id: zerofeed_demo_battery_2_capacity
        state: "{{ states('input_number.zerofeed_battery_2_capacity_kwh') | float(0) }}"
        unit_of_measurement: kWh
        state_class: measurement
      - name: ZeroFeed Battery 3 SoC
        unique_id: zerofeed_demo_battery_3_soc
        state: "{{ states('input_number.zerofeed_battery_3_soc') | float(0) }}"
        unit_of_measurement: "%"
        device_class: battery
        state_class: measurement
      - name: ZeroFeed Battery 3 Capacity
        unique_id: zerofeed_demo_battery_3_capacity
        state: "{{ states('input_number.zerofeed_battery_3_capacity_kwh') | float(0) }}"
        unit_of_measurement: kWh
        state_class: measurement
      - name: ZeroFeed Battery 4 SoC
        unique_id: zerofeed_demo_battery_4_soc
        state: "{{ states('input_number.zerofeed_battery_4_soc') | float(0) }}"
        unit_of_measurement: "%"
        device_class: battery
        state_class: measurement
      - name: ZeroFeed Battery 4 Capacity
        unique_id: zerofeed_demo_battery_4_capacity
        state: "{{ states('input_number.zerofeed_battery_4_capacity_kwh') | float(0) }}"
        unit_of_measurement: kWh
        state_class: measurement
